# ─────────────────────────────────────────────────────────────────
# Panel Agent — Sadece 1 tane, herhangi bir Render hesabında
# Kullanıcı bu servisin URL'ine browser ile bağlanır.
# Cuberite ana sunucuda (wc-tsgd.onrender.com) çalışır.
#
# Nasıl çalışır:
#   1. mc_panel.py WORKER_URL=ana_sunucu ile başlar
#   2. Flask/SocketIO web UI bu agent'ta (~90MB Python + Flask)
#   3. Başlat/Durdur/Komut → WORKER_URL/api/mc/* proxy edilir
#   4. Ana sunucu MC_ONLY=1 → Cuberite ~50MB + minimal HTTP (Flask yok)
# ─────────────────────────────────────────────────────────────────
services:
  - type: web
    name: mc-panel-agent
    runtime: docker
    dockerfilePath: ./agent.Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "5000"
      - key: MAIN_URL
        value: "https://wc-tsgd.onrender.com"
      - key: IS_PANEL
        value: "1"          # Panel host modu
      - key: RAM_CACHE_MB
        value: "200"        # Panel için daha az cache
      - key: DISK_LIMIT_GB
        value: "5.0"
      - key: AGENT_DATA
        value: "/agent_data"
    healthCheckPath: /health
    disk:
      name: panel-disk
      mountPath: /agent_data
      sizeGB: 5
