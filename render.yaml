services:

  # ══════════════════════════════════════════════════════════════
  #  ANA PROXY  —  wc-yccy.onrender.com
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: wc-yccy
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: ENGINE_MODE
        value: all  # <-- BURASI DEĞİŞTİ (proxy -> all)
      - key: DATA_DIR
        value: /data
    disk:
      name: proxy-state
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /
    autoDeploy: true

  # ══════════════════════════════════════════════════════════════
  #  GAMESERVER  —  yeni sunucu açmak için sadece bu bloğu kopyala
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: wc-gameserver-1
    # ... (kodun geri kalanı aynı)
