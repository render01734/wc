services:
  - type: web
    name: minecraft-server
    runtime: docker
    privileged: true
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "5000"
      - key: MC_RAM
        value: "300M"
      - key: RENDER_DISK_LIMIT_GB
        value: "18.0"  # Render free plan disk kotası — psutil host değerini sınırlar
    healthCheckPath: /api/ping
    numInstances: 1
